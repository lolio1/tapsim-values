<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TapSim Values</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* =========================
   ROOT VARIABLES
========================= */
:root {
    --bg: #0a0f1c;
    --panel: #0f172a;
    --panel-soft: rgba(15, 23, 42, 0.7);
    --border: rgba(255,255,255,0.06);
    --text: #e5e7eb;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --radius: 14px;
}

/* ========================= */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Inter, system-ui, -apple-system, Arial;
    background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
    color: var(--text);
    height: 100vh;
}

/* =========================
   GRID LAYOUT
========================= */
.layout {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    height: 100vh;
}

/* =========================
   LEFT SIDE
========================= */
.left {
    padding: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* =========================
   LOGO
========================= */
.logo {
    font-size: 44px;
    font-weight: 600;
    letter-spacing: -1px;
    margin-bottom: 10px;
}

.logo span {
    color: var(--accent);
}

/* =========================
   TEXT
========================= */
.subtitle {
    max-width: 420px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 40px;
}

/* =========================
   BUTTONS
========================= */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.btn {
    width: 240px;
    padding: 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--panel);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
}

.btn:hover {
    background: #1f2937;
    transform: translateY(-1px);
}

.btn.primary {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border: none;
}

/* =========================
   RIGHT SIDE
========================= */
.right {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* =========================
   CARDS GRID
========================= */
.cards {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 20px;
}

/* =========================
   CARD
========================= */
.card {
    width: 100%;
    max-width: 200px;
    padding: 16px;
    border-radius: 18px;
    background: var(--panel-soft);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.layout {
    width: 100%;
    overflow: hidden;
}
.card:hover {
    transform: translateY(-5px);
}

/* ========================= */
.pet {
    width: 70px;
    height: 70px;
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    background: #020617;
    border: 1px solid var(--border);
}

.pet img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ========================= */
.pet-name {
    font-weight: 600;
    font-size: 14px;
}

.pet-value {
    font-size: 13px;
    color: var(--muted);
}

/* =========================
   DECALS
========================= */
.circle {
    position: absolute;
    width: 300px;
    height: 300px;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 50%;
    top: 10%;
    left: 20%;
}

.circle.small {
    width: 180px;
    height: 180px;
    bottom: 15%;
    right: 15%;
}

.grid {
    position: absolute;
    width: 400px;
    height: 400px;
    background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    top: 30%;
    left: 40%;
}

/* =========================
   FLOAT
========================= */
@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(-8px); }
}

.card {
    animation: float 4s ease-in-out infinite alternate;
}

/* =========================
   FOOTER
========================= */
.footer {
    position: absolute;
    bottom: 20px;
    left: 80px;
    color: #6b7280;
    font-size: 13px;
}

/* =========================
   MOBILE FIX (NO ZOOM)
========================= */
@media (max-width: 768px) {

    body {
        overflow-x: auto;
    }

    .left {
        padding: 40px 20px;
    }

    .right {
        padding: 20px;
        justify-content: flex-start;
    }

    .logo {
        font-size: 30px;
    }

    .btn {
        width: 200px;
        padding: 10px;
        font-size: 14px;
    }

    .card {
        width: 180px;
        padding: 12px;
    }

    .pet {
        width: 60px;
        height: 60px;
    }

    .pet-name {
        font-size: 13px;
    }

    .pet-value {
        font-size: 12px;
    }

    .circle {
        width: 200px;
        height: 200px;
    }

    .circle.small {
        width: 120px;
        height: 120px;
    }

    .grid {
        width: 250px;
        height: 250px;
    }

    .footer {
        left: 20px;
        font-size: 11px;
    }
}

</style>
</head>
