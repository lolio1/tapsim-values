<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TapSim Values</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* =========================
   ROOT
========================= */
:root {
    --bg: #0a0f1c;
    --panel: #0f172a;
    --panel-soft: rgba(15, 23, 42, 0.7);
    --border: rgba(255,255,255,0.06);
    --text: #e5e7eb;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --radius: 14px;
}

/* ========================= */
* {
    box-sizing: border-box;
}

html {
    font-size: 16px;
}

@media (max-width: 768px) {
    html {
        font-size: 13px;
    }
}

body {
    margin: 0;
    font-family: Inter, system-ui, Arial;
    background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
    color: var(--text);
    min-height: 100vh;
}

/* =========================
   LAYOUT
========================= */
.layout {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    min-height: 100vh;
    width: 100%;
}

/* =========================
   LEFT
========================= */
.left {
    padding: 5rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* =========================
   LOGO
========================= */
.logo {
    font-size: 2.7rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
}

.logo span {
    color: var(--accent);
}

/* =========================
   TEXT
========================= */
.subtitle {
    max-width: 26rem;
    color: var(--muted);
    margin-bottom: 2.5rem;
    line-height: 1.5;
}

/* =========================
   BUTTONS
========================= */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
}

.btn {
    width: 15rem;
    padding: 0.9rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--panel);
    color: white;
    font-size: 0.95rem;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    background: #1f2937;
}

.btn.primary {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border: none;
}

/* =========================
   RIGHT
========================= */
.right {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* =========================
   CARDS
========================= */
.cards {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1.2rem;
}

/* =========================
   CARD
========================= */
.card {
    width: 100%;
    max-width: 12.5rem;
    padding: 1rem;
    border-radius: 1rem;
    background: var(--panel-soft);
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-3px);
}

/* =========================
   IMAGE
========================= */
.pet {
    width: 4.5rem;
    height: 4.5rem;
    border-radius: 0.7rem;
    overflow: hidden;
    background: #020617;
    margin-bottom: 0.5rem;
}

.pet img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ========================= */
.pet-name {
    font-size: 0.9rem;
    font-weight: 600;
}

.pet-value {
    font-size: 0.8rem;
    color: var(--muted);
}

/* =========================
   DECALS
========================= */
.circle {
    position: absolute;
    width: 18rem;
    height: 18rem;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 50%;
    top: 10%;
    left: 20%;
}

.circle.small {
    width: 11rem;
    height: 11rem;
    bottom: 15%;
    right: 15%;
}

.grid {
    position: absolute;
    width: 25rem;
    height: 25rem;
    background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 2.5rem 2.5rem;
    top: 30%;
    left: 40%;
}

/* =========================
   FOOTER
========================= */
.footer {
    position: absolute;
    bottom: 1rem;
    left: 5rem;
    font-size: 0.8rem;
    color: #6b7280;
}

/* =========================
   MOBILE FIX (REAL ONE)
========================= */
@media (max-width: 768px) {

    /* Reduce padding */
    .left {
        padding: 2.5rem;
    }

    /* Make right side tighter */
    .right {
        padding: 1rem;
    }

    /* Slightly reduce spacing */
    .cards {
        gap: 0.8rem;
    }

    /* Ensure everything fits */
    .layout {
        overflow: hidden;
    }

    /* Slightly smaller cards */
    .card {
        max-width: 11rem;
    }

    /* Footer adjust */
    .footer {
        left: 2rem;
        bottom: 1rem;
    }
}
</style>
</head>
