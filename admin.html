<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* SAME STYLE SYSTEM */
:root {
    --panel: #0f172a;
    --border: rgba(255,255,255,0.06);
    --text: #e5e7eb;
    --accent: #3b82f6;
}

body {
    margin: 0;
    font-family: Inter, Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: var(--text);
}

/* HEADER */
.header {
    padding: 40px;
    display: flex;
    justify-content: space-between;
}

/* BUTTON */
.btn {
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: white;
    cursor: pointer;
}

/* FORM */
.form {
    padding: 20px 40px;
    display: flex;
    gap: 10px;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: white;
}

/* LIST */
.list {
    padding: 20px 40px;
}

.item {
    display: flex;
    justify-content: space-between;
    background: rgba(15,23,42,0.6);
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 10px;
}

/* ACTIONS */
.actions button {
    margin-left: 6px;
}

</style>
</head>

<body>

<div class="header">
    <h2>Admin Panel</h2>
    <button class="btn" onclick="goBack()">← Back</button>
</div>

<!-- ADD PET -->
<div class="form">
    <input id="name" placeholder="Pet name">
    <input id="value" placeholder="Value">
    <button class="btn" onclick="addPet()">Add</button>
</div>

<!-- LIST -->
<div class="list" id="list"></div>

<script>

/* LOAD DATA */
let pets = JSON.parse(localStorage.getItem("pets")) || [];

/* RENDER */
function render() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    pets.forEach((pet, index) => {
        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div>${pet.name} - ${pet.value}</div>
            <div class="actions">
                <button onclick="editPet(${index})">Edit</button>
                <button onclick="deletePet(${index})">Delete</button>
            </div>
        `;

        list.appendChild(div);
    });

    save();
}

/* ADD */
function addPet() {
    let name = document.getElementById("name").value;
    let value = Number(document.getElementById("value").value);

    if (!name || !value) return;

    pets.push({name, value});
    render();
}

/* DELETE */
function deletePet(i) {
    pets.splice(i, 1);
    render();
}

/* EDIT */
function editPet(i) {
    let newName = prompt("New name:", pets[i].name);
    let newValue = prompt("New value:", pets[i].value);

    if (newName) pets[i].name = newName;
    if (newValue) pets[i].value = Number(newValue);

    render();
}

/* SAVE */
function save() {
    localStorage.setItem("pets", JSON.stringify(pets));
}

/* BACK */
function goBack() {
    window.location.href = "valuelist.html";
}

/* INIT */
render();

</script>

</body>
</html>
