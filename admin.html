<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* SAME STYLE SYSTEM */
:root {
    --panel: #0f172a;
    --border: rgba(255,255,255,0.06);
    --text: #e5e7eb;
    --accent: #3b82f6;
}

body {
    margin: 0;
    font-family: Inter, Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: var(--text);
}

/* HEADER */
.header {
    padding: 40px;
    display: flex;
    justify-content: space-between;
}

/* BUTTON */
.btn {
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: white;
    cursor: pointer;
}

/* FORM */
.form {
    padding: 20px 40px;
    display: flex;
    gap: 10px;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: white;
}

/* LIST */
.list {
    padding: 20px 40px;
}

.item {
    display: flex;
    justify-content: space-between;
    background: rgba(15,23,42,0.6);
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 10px;
}

/* ACTIONS */
.actions button {
    margin-left: 6px;
}

</style>
</head>

<body>

<div class="header">
    <h2>Admin Panel</h2>
    <button class="btn" onclick="goBack()">← Back</button>
</div>

<!-- ADD PET -->
<div class="form">
    <input id="name" placeholder="Pet name">
    <input id="value" placeholder="Value">
    <button class="btn" onclick="addPet()">Add</button>
</div>

<!-- LIST -->
<div class="list" id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBG1OsdiEVZfwJIQNzvvgjZE1EGwWePC_U",
  authDomain: "tapsim-values.firebaseapp.com",
  projectId: "tapsim-values",
  storageBucket: "tapsim-values.firebasestorage.app",
  messagingSenderId: "808053670075",
  appId: "1:808053670075:web:a606843badfd99079ee99e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function addPet() {
    const name = document.getElementById("name").value;
    const value = Number(document.getElementById("value").value);

    if (!name || !value) return;

    await addDoc(collection(db, "pets"), {
        name,
        value
    });

    location.reload();
}

async function loadPets() {
    const snapshot = await getDocs(collection(db, "pets"));
    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(docSnap => {
        const pet = docSnap.data();

        list.innerHTML += `
            <div>
                ${pet.name} - ${pet.value}
                <button onclick="editPet('${docSnap.id}')">Edit</button>
                <button onclick="deletePet('${docSnap.id}')">Delete</button>
            </div>
        `;
    });
}

async function deletePet(id) {
    await deleteDoc(doc(db, "pets", id));
    location.reload();
}

async function editPet(id) {
    let newValue = prompt("New value:");

    if (!newValue) return;

    await updateDoc(doc(db, "pets", id), {
        value: Number(newValue)
    });

    location.reload();
}

window.addPet = addPet;
window.deletePet = deletePet;
window.editPet = editPet;

loadPets();

</script>

</body>
</html>
