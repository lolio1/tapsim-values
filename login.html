<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
body {
    background: #020617;
    color: white;
    font-family: Inter;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #0f172a;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #1e293b;
    color: white;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>Admin Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<script>

const accounts = [
    { user: "admin", pass: "1234" },
    { user: "You know what he said to me? WHAT! he was like you’re so RUDE!", pass: "And I was like BOY! do I look like I could care? I couldn’t even care LESS!" }
];

function login() {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    const found = accounts.find(acc => acc.user === u && acc.pass === p);

    if (found) {
        localStorage.setItem("admin", "true");
        window.location.href = "admin.html";
    } else {
        alert("Wrong login");
    }
}

</script>

</body>
</html>
