<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TapSim Values</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* =========================
   ROOT
========================= */
:root {
    --panel: #0f172a;
    --panel-soft: rgba(15,23,42,0.7);
    --border: rgba(255,255,255,0.06);
    --text: #e5e7eb;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --radius: 14px;
}

/* ========================= */
* {
    box-sizing: border-box;
}

html {
    font-size: 16px;
}

@media (max-width: 768px) {
    html {
        font-size: 13px;
    }
}

body {
    margin: 0;
    font-family: Inter, system-ui, Arial;
    background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
    color: var(--text);
    min-height: 100vh;
}

/* =========================
   HEADER
========================= */
.header {
    padding: 3rem 5rem 1rem;
}

.logo {
    font-size: 2.7rem;
    font-weight: 600;
}

.logo span {
    color: var(--accent);
}

/* =========================
   TOPBAR
========================= */
.topbar {
    padding: 0 5rem 1.5rem;
    display: flex;
    gap: 0.8rem;
    align-items: center;
}

/* =========================
   BUTTON
========================= */
.btn {
    padding: 0.7rem 1rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--panel);
    color: white;
    cursor: pointer;
    transition: 0.2s;
    font-size: 0.9rem;
}

.btn:hover {
    background: #1f2937;
}

/* =========================
   INPUTS
========================= */
input, select {
    padding: 0.7rem 1rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--panel);
    color: white;
    font-size: 0.9rem;
}

/* =========================
   GRID
========================= */
.grid {
    padding: 1.5rem 5rem 3rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(14rem, 1fr));
    gap: 1.2rem;
}

/* =========================
   CARD
========================= */
.card {
    background: var(--panel-soft);
    border-radius: 1rem;
    padding: 0.9rem;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
    transition: 0.2s;
    position: relative;
}

.card:hover {
    transform: translateY(-0.3rem);
}

/* =========================
   IMAGE
========================= */
.pet {
    width: 100%;
    height: 8.5rem;
    border-radius: 0.7rem;
    overflow: hidden;
    background: #020617;
}

.pet img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* =========================
   TEXT
========================= */
.name {
    font-weight: 600;
    margin-top: 0.6rem;
    font-size: 0.95rem;
}

.value {
    font-size: 1.1rem;
    font-weight: 600;
    margin-top: 0.3rem;
}

/* =========================
   BADGE
========================= */
.badge {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    font-size: 0.7rem;
    padding: 0.2rem 0.5rem;
    border-radius: 0.4rem;
    background: rgba(59,130,246,0.2);
    color: var(--accent);
}

/* =========================
   FOOTER
========================= */
.footer {
    padding: 2rem 5rem;
    font-size: 0.8rem;
    color: #6b7280;
}

/* =========================
   MOBILE FIX (MATCH INDEX)
========================= */
@media (max-width: 768px) {

    /* Reduce padding */
    .header {
        padding: 2rem 2rem 1rem;
    }

    .topbar {
        padding: 0 2rem 1rem;
        gap: 0.6rem;
    }

    .grid {
        padding: 1rem 2rem 2rem;
        gap: 0.8rem;
    }

    /* Smaller inputs */
    input, select {
        font-size: 0.8rem;
        padding: 0.5rem 0.8rem;
    }

    /* Smaller buttons */
    .btn {
        font-size: 0.8rem;
        padding: 0.5rem 0.8rem;
    }

    /* Smaller cards */
    .card {
        padding: 0.7rem;
    }

    /* Image smaller */
    .pet {
        height: 7rem;
    }

    /* Text */
    .name {
        font-size: 0.85rem;
    }

    .value {
        font-size: 1rem;
    }

    /* Footer */
    .footer {
        padding: 1.5rem 2rem;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">TapSim <span>Values</span></div>
</div>

<!-- CONTROLS -->
<div class="topbar">
    <button class="btn" onclick="goBack()">← Lobby</button>

    <input type="text" id="search" placeholder="Search pets...">

    <select id="sort">
        <option value="high">High → Low</option>
        <option value="low">Low → High</option>
        <option value="name">A → Z</option>
    </select>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<div class="footer">© 2026 TapSim Values</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBG1OsdiEVZfwJIQNzvvgjZE1EGwWePC_U",
  authDomain: "tapsim-values.firebaseapp.com",
  projectId: "tapsim-values",
  storageBucket: "tapsim-values.firebasestorage.app",
  messagingSenderId: "808053670075",
  appId: "1:808053670075:web:a606843badfd99079ee99e"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let pets = [];

async function loadPets() {
    const snapshot = await getDocs(collection(db, "pets"));
    pets = [];

    snapshot.forEach(doc => {
        pets.push({ id: doc.id, ...doc.data() });
    });

    render();
}

function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    pets.forEach(pet => {
        grid.innerHTML += `
            <div class="card">
                <div class="pet">
                    <img src="https://via.placeholder.com/150">
                </div>
                <div class="name">${pet.name}</div>
                <div class="value">${pet.value}</div>
            </div>
        `;
    });
}

loadPets();

</script>

</body>
</html>
